name: simple
description: |
  baseline の出庫だけをストレージID昇順の選択に変えたシナリオ。
  出庫の選び方（FIFO vs 箱ID順）の違いを見るための比較用。
inbound:
  class: "sim.algorithms.baseline:FillEmptyStorageInbound"
  args: {}
outbound:
  class: "sim.algorithms.baseline:SmallestStorageFirstOutbound"
  args: {}
stocktake:
  class: "sim.algorithms.baseline:NoStocktake"
  args: {}
costs:
  inbound_per_storage_sec: 30
  outbound_pick_per_storage_sec: 58.49
  outbound_per_card_sec: 0.2
