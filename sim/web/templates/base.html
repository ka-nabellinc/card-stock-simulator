<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}倉庫シミュレーター{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f5f6fa;
      color: #222;
    }
    nav {
      background: #1a237e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover { color: #fff; }
    nav .brand {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      margin-right: auto;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 { font-size: 22px; margin-bottom: 16px; }
    h2 { font-size: 17px; margin-bottom: 12px; color: #333; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 7px 10px;
      border-bottom: 1px solid #e8e8e8;
    }
    th { background: #f0f2ff; font-weight: 600; color: #444; }
    tr:hover td { background: #fafbff; }
    .btn {
      display: inline-block;
      padding: 6px 14px;
      background: #1a237e;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
    }
    .btn:hover { background: #283593; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-blue { background: #e3f2fd; color: #0d47a1; }
    .badge-green { background: #e8f5e9; color: #1b5e20; }
    .badge-orange { background: #fff3e0; color: #e65100; }
    canvas { max-width: 100%; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <span class="brand">倉庫シミュレーター</span>
  <a href="/">ホーム</a>
  <a href="/compare">シナリオ比較</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script>
// Chart.js ミニマル実装（外部CDN不使用）
// 簡易折れ線グラフ描画ユーティリティ
const SimpleChart = {
  colors: ['#1a237e','#00838f','#e65100','#4caf50','#9c27b0'],
  _tooltip: null,

  _getTooltip() {
    if (!this._tooltip) {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;pointer-events:none;z-index:1000;display:none;'
        + 'background:rgba(33,33,33,.92);color:#fff;font-size:12px;line-height:1.5;'
        + 'padding:8px 10px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);white-space:nowrap;';
      document.body.appendChild(el);
      this._tooltip = el;
    }
    return this._tooltip;
  },

  _fmt(v, opts) {
    return v.toFixed(opts.decimals ?? 0) + (opts.suffix || '');
  },

  draw(canvasId, labels, datasets, opts = {}) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const state = { labels, datasets, opts };
    canvas.__chart = state;
    this._render(canvas, -1);

    if (!canvas.__hoverBound) {
      canvas.__hoverBound = true;
      canvas.addEventListener('mousemove', (e) => this._onMove(canvas, e));
      canvas.addEventListener('mouseleave', () => {
        this._getTooltip().style.display = 'none';
        if (canvas.__chart) this._render(canvas, -1);
      });
    }
  },

  _onMove(canvas, e) {
    const st = canvas.__chart;
    if (!st || !st.labels.length) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const pad = { top: 20, right: 20, bottom: 40, left: 60 };
    const innerW = canvas.width - pad.left - pad.right;
    const n = st.labels.length;
    let idx = Math.round(((mx - pad.left) / innerW) * Math.max(n - 1, 1));
    idx = Math.max(0, Math.min(n - 1, idx));

    this._render(canvas, idx);

    const tip = this._getTooltip();
    let html = `<div style="font-weight:600;margin-bottom:4px">${st.labels[idx]}</div>`;
    st.datasets.forEach((ds, di) => {
      const v = ds.data[idx];
      const color = ds.color || this.colors[di % this.colors.length];
      const txt = (v == null || isNaN(v)) ? '—' : this._fmt(v, st.opts);
      html += `<div style="display:flex;align-items:center;gap:6px">`
        + `<span style="width:9px;height:9px;border-radius:2px;background:${color};display:inline-block"></span>`
        + `<span>${ds.label ? ds.label + ': ' : ''}${txt}</span></div>`;
    });
    tip.innerHTML = html;
    tip.style.display = 'block';
    // position near cursor, flip left if near right edge
    const tw = tip.offsetWidth;
    let left = e.clientX + 14;
    if (left + tw > window.innerWidth - 8) left = e.clientX - tw - 14;
    tip.style.left = left + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  },

  _render(canvas, highlight) {
    const { labels, datasets, opts } = canvas.__chart;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pad = { top: 20, right: 20, bottom: 40, left: 60 };
    ctx.clearRect(0, 0, W, H);

    const allVals = datasets.flatMap(d => d.data.filter(v => v != null && !isNaN(v)));
    if (!allVals.length) { ctx.fillStyle = '#999'; ctx.textAlign = 'center'; ctx.fillText('データなし', W/2, H/2); return; }
    const minV = opts.minY ?? Math.min(...allVals);
    const maxV = opts.maxY ?? Math.max(...allVals);
    const range = maxV - minV || 1;

    const xScale = (i) => pad.left + (i / Math.max(labels.length - 1, 1)) * (W - pad.left - pad.right);
    const yScale = (v) => H - pad.bottom - ((v - minV) / range) * (H - pad.top - pad.bottom);

    // grid lines
    ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = H - pad.bottom - (i / 4) * (H - pad.top - pad.bottom);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      const val = minV + (range * i / 4);
      ctx.fillStyle = '#999'; ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(val.toFixed(opts.decimals ?? 0) + (opts.suffix || ''), pad.left - 4, y + 3);
    }

    // x labels (show max 10)
    ctx.fillStyle = '#999'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    const step = Math.ceil(labels.length / 10);
    labels.forEach((l, i) => {
      if (i % step === 0) ctx.fillText(l, xScale(i), H - pad.bottom + 14);
    });

    // crosshair for highlighted index
    if (highlight >= 0) {
      const hx = xScale(highlight);
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(hx, pad.top); ctx.lineTo(hx, H - pad.bottom); ctx.stroke();
      ctx.setLineDash([]);
    }

    // datasets
    datasets.forEach((ds, di) => {
      const color = ds.color || this.colors[di % this.colors.length];
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
      ctx.beginPath();
      let started = false;
      ds.data.forEach((v, i) => {
        if (v == null || isNaN(v)) return;
        const x = xScale(i), y = yScale(v);
        if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // highlighted point marker
      if (highlight >= 0) {
        const v = ds.data[highlight];
        if (v != null && !isNaN(v)) {
          const x = xScale(highlight), y = yScale(v);
          ctx.fillStyle = '#fff'; ctx.strokeStyle = color; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        }
      }
    });

    // legend
    if (opts.legend !== false) {
      let lx = pad.left;
      datasets.forEach((ds, di) => {
        const color = ds.color || this.colors[di % this.colors.length];
        ctx.fillStyle = color;
        ctx.fillRect(lx, 4, 14, 10);
        ctx.fillStyle = '#444'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(ds.label || '', lx + 18, 13);
        lx += ctx.measureText(ds.label || '').width + 36;
      });
    }
  }
};
</script>
{% block scripts %}{% endblock %}
</body>
</html>
